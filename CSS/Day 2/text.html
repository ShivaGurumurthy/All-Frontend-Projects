<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            color:blue;
            text-transform:capitalize;
            text-align: center;
            text-decoration: underline wavy orange;
        }
        /*Span is an inline level element, so it will not take the full width of the page and it cannot be centered using this!!!*/
        span{
            color:red;
            text-align: center;
            text-decoration:line-through wavy blueviolet;
        }
    </style>
</head>
<body>
    <p>Text Properties using a Paragraph!</p>
    <span><center>Hey! Myself Span! <br> Span gets a strike through!!</center></span>
</body>
</html>
