<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .one{
            color: green;
        }
        #first{
            color:chocolate;
        }
        p{
            color:red;
        }

        h1{
            color:brown;
        }
        #second{
            color:blueviolet;
        }
        .two{
            color:cadetblue;
        }
    </style>
</head>
<body>
    <p id = "first" class = "one">Let's see the specificity of selectors</p>
    <h1 id = "second" class = "two">Heading 1, let's see what color you are going to become!!!</h1>
</body>
</html>
