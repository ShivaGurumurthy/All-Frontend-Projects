<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width='device-width', initial-scale=1.0">
    <title>Document</title>
    <!-- If there are any overriding changes to a selector, only that will be changed to the last CSS style change... Otherwise, if there are no overriding elements, they will be automatically changed to the specific format and need!  -->
    <style>
        p{
            color: violet;
           background-color: blue;
            height:250px;
        }
    </style>
    <link rel="stylesheet" href="inline_internal_external.css">
</head>
<body>
    <p>Let's see which type of CSS will be applied?!</p>
</body>
</html>
