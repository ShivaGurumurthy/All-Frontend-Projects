<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 100px;
            width:100px;
        }
        div:first-child{
            background-color: aqua;
            position: absolute;
            top:0;
            right:0;

            
        }
        div:nth-child(2){
            background-color: red;
            position: absolute;
            bottom:0;
            right:0;
            
            
        }
        div:nth-child(3){
            background-color: magenta;
            position: absolute;
            top:0;
            left:0;
                 
        }
        div:nth-child(4){
            background-color: green;
            position: absolute;
            bottom:0px;
            left:0px;
        }
        div:nth-child(5){
            background-color: beige;
            position: absolute;
            left:482px;
            top:400px;

        }
    </style>
</head>
<body>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
</body>
</html>
