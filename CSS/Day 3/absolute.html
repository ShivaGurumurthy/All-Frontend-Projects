<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display:flex;
            height:100vh;
            justify-content: center; 
            align-items: center;
        }
        section{
            height: 420px;
            width:800px;
            border: 4px solid black;
            position:relative;
        }
        div{
            height: 100px;
            width:100px;
        }
        div:first-child{
            background-color: pink;
            position: absolute;
            top:0;
            right:0;
            
        }
        div:nth-child(2){
            background-color: blueviolet;
            position: absolute;
            top:0;
            left:0;
            
        }
        div:nth-child(3){
            background-color: antiquewhite;
            position: absolute;
            bottom:0;
            right:0;
                 
        }
        div:nth-child(4){
            background-color:black;
            position: absolute;
            bottom:0%;
            right:44%;
        }
        div:nth-child(5){
            background-color:palegreen;
            position: absolute;
            top:0;
            right:44%;
        }
        div:nth-child(6){
            background-color: beige;
            position: absolute;
            bottom:0;
            left:0;
        }div:nth-child(7){
            background-color: salmon;
            position: absolute;
            top:36%;
            right:0%;
        }div:nth-child(8){
            background-color: palevioletred;
            position: absolute;
            top:36%;
            right:44%;
        }div:nth-child(9){
            background-color: red;
            position: absolute;
            top:36%;
            left:0; 
        }
    </style>
</head>
<body>
    <section>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </section>
</body>
</html>
