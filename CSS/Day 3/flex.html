<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section{
            height: 900px;
            width: 1200px;
            border: 15px solid black;
            display: flex;
            justify-content:space-evenly;
            /* align-items: end; */
            flex-wrap: wrap;
            /* align-content: space-between; */
            gap: 10px; /*First is for row and the second is for the column*/
            flex-direction: row;
            align-items:start;
        }
        div{
            height: 100px;
            width: 100px;
            background-color: aqua;
            border: 2px solid black;
            font-size: larger;
            
        }
        section div:nth-child(2){
            background-color: gray;
            order: 1;
        }
        section div:nth-child(4){
            background-color: chocolate;
            order:3;
        }
    </style>
</head>
<body>
    <section>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>

</html>
