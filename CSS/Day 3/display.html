<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            display: inline-block;
            width: 1000px;
            /* display: none; */
            visibility: normal; /*Visibility takes space where as display: none just removes the content from the site and it just displays the element in the HTML FILE!*/
        }
        span{
            display: block;
        }
    </style>
</head>
<body>
    <div>
        I'm a block level element!
    </div>
    <span>
        I'm a inline level element!
    </span>
</body>
</html>
