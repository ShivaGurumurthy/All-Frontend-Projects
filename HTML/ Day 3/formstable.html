<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form table</title>
</head>
<body>
    <form action="">
        <fieldset>
            <legend><h2><b>Personal Details</b></h2></legend>
            <table>
                <tr>
                    <td><label for="">Name:</label></td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td><label for="">Age:</label></td>
                    <td><input type="number"></td>
                </tr>
                <tr>
                    <td><label for="">Email:</label></td>
                    <td><input type="email"></td>
                </tr>
                <tr>
                    <td><label for="">Password:</label></td>
                    <td><input type="password" name="" id=""></td>
                </tr>
                <tr>
                    <td><label for="">Address:</label></td>
                    <td><textarea name="address" id=""></textarea></td>
                </tr>
                <tr>
                    <td><label for="">DOB:</label></td>
                    <td><input type="date" name="" id=""></td>
                </tr>
                
                <tr>
                    <td> <label for="state">STATE:</label></td>
                        <td><select name="state" id="state">
                        <option value=""></option>
                        <option value="Delhi">Delhi</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Kerala">Kerala</option>
                        <option value="Tamil Nadu"> Tamil Nadu</option>
                        <option value="Karnataka">Karnataka</option>
                        </select></td>
                </tr>

                <tr>
                    <td><label for="gen">Gender</label></td>
                    <td><input type="radio" name="Gender" value="Male">Male
                        <input type="radio" name="Gender" value="Female">Female
                        <input type="radio" name="Gender" value="other ">other </td>
                </tr>

                <tr>
                    <td><label for="skill">SKILLS:</label></td>
                    <td><input type="checkbox" name="SKILLS" value="HTML">HTML
                        <input type="checkbox" name="SKILLS" value="CSS">CSS
                        <input type="checkbox" name="SKILLS" value="JAVASCRIPT">JAVASCRIPT</td>
                </tr>

                <tr>
                    <td><button>submit</button></td>
                </tr>
            </table>
        </fieldset>
    </form>
</body>
</html>
