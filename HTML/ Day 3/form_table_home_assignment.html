<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        fieldset{
            width: 50%;
            height:100%;
        }
    </style>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Job Application Form</legend>
        <table>
            <tr>
                <td><label for="fname">First Name</label></td>
                <td><input type="text" name = "fname" id = "fname"></td>
            </tr>
            <tr>
                <td><label for="lname">Last Name</label></td>
                <td><input type="text" name = "lname" id = "lname"></td>
                    
            </tr>
            <tr>
                <td><label for="mail">Email</label></td>
                <td><input type="email" name = "mail" id = "mail"></td>        
            </tr>
            <tr>
                <td><label for="phone">Phone Number</label></td>
                <td><input type="tel" name = "phone" id = "phone"></td>        
            </tr>
                <td><label for="">DOB</label></td>
                <td><input type="date"></td>        
            </tr>
            <tr>
                <td><label for="gen">Gender</label></td>
                <td>
                    <input type="radio" name="Gender" value="Male">Male
                    <input type="radio" name="Gender" value="Female">Female
                </td>
            <tr>
                <td><label for="address">Address</label></td>
                <td><textarea name="address" id="address"></textarea></td>
            </tr>
            <tr>
                <td><label for="phone">Phone Number</label></td>
                <td><input type="tel" name = "phone" id = "phone"></td>        
            </tr>
            <tr>
                <td><label for="city">City</label></td>
                <td><input type="text" name = "city" id = "city"></td>
            </tr>
            <tr>
                <td><label for="state">State</label></td>
                <td><select name="state" id="state">
                    <option value=""></option>
                    <option value="Delhi">Delhi</option>
                    <option value="Tamil Nadu">Tamil Nadu</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Kerala">Kerala</option>
                    <option value="Telengana">Telengana</option>
                    <option value="Andhra Pradesh">Andhra Pradesh</option>
                </select></td>  
            </tr>
            <tr>
                <td><label for="pincode">Pin Code</label></td>
                <td><input type="number" name = "pincode" id = "pincode"></td>    
            </tr>
            <tr>
               <td><label for="pos">Position Applied For</label></td>
                <td><select name="pos" id="pos">
                    <option value=""></option>
                    <option value="Senior Developer">Senior Developer</option>
                    <option value="Junior Developer">Junior Developer</option>
                </select></td>  
            </tr>
            <tr>
                <td><label for="resume">Upload Resume</label></td>
                <td><input type="file" required></td>
            </tr>
            <tr>
                <td><label for="linkedin">LinkedIn Profile</labelLinkedIn Profile>
                <td><input type="url" required></td>
            </tr>
            </tr>
                <td><label for="">Available Start Date</label></td>
                <td><input type="date"></td>        
             </tr>
             <tr>
                <td><label for="expsal">Expected Salary</label></td>
                <td><input type="number" name = "expsal" id = "expsal"></td>        
            </tr>
            <tr>
                <td><label for="wtr">Willing to relocate</label></td>
                 <td><select name="wtr" id="wtr">
                     <option value="Yes">Yes</option>
                     <option value="No">No</option>
                 </select></td>  
             </tr>
        </table>
        <br>
        <input type="submit" value="Submit Application!"
    </fieldset>
    </form>
</body>
</html>
