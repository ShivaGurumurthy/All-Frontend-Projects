<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form tag</title>
</head>
<body>
    <form action="">
        <label for="comapany">Company:</label>
        <input type="text" name="comapany" id="company" value=GOOGLE disabled><br><br>

        <label for="name">NAME:</label>
        <input type="text" id="name" name="NAME" placeholder="Enter a Name"><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="Email" placeholder="Enter a Email"><br><br>
        
        <label for="age">AGE:</label>
        <input type="number" id="age" name="AGE" placeholder="Enter y" min="21" max="25" required><br><br>
        
        <label for="password">PASSWORD:</label>
        <input type="password"  id="password" name="PASSWORD" placeholder="Enter a password" required><br><br>
        
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="Date"><br><br>
        
        <label for="mob">Mobile Number:</label>
        <input type="tel" id="mob" name="Mobile" placeholder="Enter a Mobile no"><br><br>
        
        <label for="gen">Gender</label>
        <input type="radio" name="Gender" value="Male">Male
        <input type="radio" name="Gender" value="Female">Female
        <input type="radio" name="Gender" value="other ">other <br><br>
        
        <label for="skill">SKILLS:</label>
        <input type="checkbox" name="SKILLS" value="HTML">HTML
        <input type="checkbox" name="SKILLS" value="CSS">CSS
        <input type="checkbox" name="SKILLS" value="JAVASCRIPT">JAVASCRIPT <br><br>
        
        <label for="state">STATE:</label>
        <select name="state" id="state">
        <option value=""></option>
        <option value="Delhi">Delhi</option>
        <option value="Mumbai">Mumbai</option>
        <option value="Kerala">Kerala</option>
        <option value="Tamil Nadu">Tamil Nadu</option>
        <option value="Karnataka">Karnataka</option>
        </select><br><br>

        <label for="address">ADDRESS:</label>
        <textarea name="address" id="address"></textarea><br><br>

        <fieldset>
        <legend><h2><b>JOB Details</b></h2></legend>
        <label for="resume">RESUME:</label>
        <input type="file" name="resume" id="resume" multiple required><br><br>

        <label for="linkedin">LINKEDIN:</label>
        <input type="url" name="Linkedin" id="linkedin"><br><br>

        <label for="">Positions:</label>
        <select name="" id="" multiple>
        <option value="web developer">WEB DEVELOPER</option>
        <option value="tester">TESTER</option>
        <option value="fullstack developer">FULLSTACK DEVELOPER</option>
        <option value="software engineer">SOFTWARE ENGINNER</option>
        </select>
        </fieldset>

        <button>Reset</button>
        <button>Submit</button>
        
        <!-- <input type="submit">
        <input type="button"  value="Button"> -->
    </form>
</body>
</html>
