<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--Block Level Elements--> 
    <div>H!</div> <!--A Div takes the full viewport's width even if there is nothing or a single character to display.-->
    <div>Hello!!</div>
    <span>Helloooo</span> <!-- A Span doesn't take the full viewport's width, rather it takes the needed space to fill in the necessary content -->
    <br>
    <span>Hola</span>
</body>
</html>
