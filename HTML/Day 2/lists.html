<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Unordered Lists -->
    <ul type="square">  <!--Circle, Square, Disc(Default) and none-->
        <li>Apples</li>
        <li>Mangoes</li>
        <li>Bananas</li>
        <li>Oranges</li>
    </ul>

    <!-- Ordered Lists -->
     <ol type = "a" reversed start = "1"> <!-- Start attribute only accepts numbers!!--> <!--Reversed - Used to reverse numbers (EVEN TAKES NEGATIVE VALUES!!-->
        <li>Akshay P Raj</li>
        <li>Shiva Gurumurthy</li>
        <li>Sijo Santhosh</li>
        <li>Sudaroli Kotesswaran</li>
     </ol>
</body>
</html>
